<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 로그인 — Paraent</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e5e5e7;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 40px;
    }
    .logo-area img {
      height: 36px;
      margin-bottom: 16px;
    }
    .logo-area h1 {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .logo-area p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-top: 6px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.2); }
    .form-input:focus {
      border-color: #2997ff;
      background: rgba(41,151,255,0.08);
    }
    .btn-login {
      width: 100%;
      padding: 13px;
      background: #0066cc;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-login:hover { background: #0071e3; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #444; cursor: not-allowed; }
    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      background: rgba(255,69,58,0.15);
      border: 1px solid rgba(255,69,58,0.3);
      border-radius: 8px;
      font-size: 13px;
      color: #ff6961;
      text-align: center;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="logo-area">
    <img src="../assets/images/logo-white.png" alt="Paraent" />
    <h1>관리자 페이지</h1>
    <p>Paraent Admin Dashboard</p>
  </div>

  <div class="card">
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="email" class="form-input" placeholder="admin@paraent.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">로그인</button>
      <div class="error-msg" id="errorMsg">이메일 또는 비밀번호가 올바르지 않습니다.</div>
    </form>
  </div>

  <a href="../index.html" class="back-link">← 홈페이지로 돌아가기</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const SUPABASE_URL = 'https://ttrxqfrzzwyrpgiyjwix.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0cnhxZnJ6end5cnBnaXlqd2l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3OTM2MjcsImV4cCI6MjA5NTM2OTYyN30.xUJwYc7e4hir3zNEWT1JvEnWHLkxVlDB3P56XHUJ1eg';
  const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 이미 로그인된 경우 대시보드로
  _supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = './dashboard.html';
  });

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.textContent = '로그인 중...';
    btn.disabled = true;
    errorMsg.style.display = 'none';

    const { error } = await _supabase.auth.signInWithPassword({ email, password });

    if (error) {
      errorMsg.style.display = 'block';
      btn.textContent = '로그인';
      btn.disabled = false;
      return;
    }

    window.location.href = './dashboard.html';
  }
</script>
</body>
</html>
